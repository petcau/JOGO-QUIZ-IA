<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Animal - App Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container do Quiz -->
    <div class="quiz-container" id="quiz">
        <header class="quiz-header">
            <h1>Mundo Animal 🐾</h1>
            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>
            <p id="progress-text">Pergunta 1 de 10</p>
        </header>

        <main class="question-area">
            <h2 id="question">Carregando pergunta...</h2>
            <div id="options" class="options-grid">
                <!-- Alternativas via JS -->
            </div>
        </main>

        <footer class="quiz-footer">
            <button id="next-btn" class="btn" disabled>Próxima</button>
        </footer>
    </div>

    <!-- Tela de Resultado -->
    <div class="result-container hidden" id="result-screen">
        <header>
            <h2>Fim de Jogo!</h2>
        </header>
        <main class="result-content">
            <div class="score-circle">
                <span id="score-text">0/10</span>
            </div>
            <p id="message">Mensagem de desempenho.</p>
        </main>
        <footer>
            <button id="restart-btn" class="btn">Jogar Novamente</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
